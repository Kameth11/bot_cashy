name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  dashboard-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  notify:
    runs-on: ubuntu-latest
    needs: [backend-tests, dashboard-build]
    if: always()
    steps:
      - name: Notificar a Discord
        run: |
          if [ "${{ needs.backend-tests.result }}" = "success" ] && [ "${{ needs.dashboard-build.result }}" = "success" ]; then
            STATUS="✅ CI en verde"
            COLOR=3066993
          else
            STATUS="❌ CI con errores"
            COLOR=15158332
          fi
          curl -H "Content-Type: application/json" -X POST -d '{
            "embeds": [{
              "title": "'"$STATUS"'",
              "description": "Repo: ${{ github.repository }}\nRama: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nAutor: ${{ github.actor }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "color": '"$COLOR"'
            }]
          }' "${{ secrets.DISCORD_WEBHOOK_URL }}"
